name: Swift CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: swift-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests-and-benchmark-gate:
    name: Host tests and benchmark gate
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          uname -a

      - name: Run host tests
        run: swift test

      - name: Run synthetic benchmark gate
        run: swift run -c release ViewportBenchmarks -- --gate

      - name: Run variable-height benchmark observation
        continue-on-error: true
        run: swift run -c release ViewportBenchmarks -- --variable-height

      - name: Run memory shape diagnostic
        run: swift run -c release ViewportBenchmarks -- --memory-shape

      - name: Run RSS memory observation diagnostic
        run: swift run -c release ViewportBenchmarks -- --memory-observation

      - name: Observe realistic provider relative performance
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          REALISTIC_RELATIVE_OBSERVATION_THRESHOLD: "1.221556"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "observation_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "runner_image=${ImageOS:-unknown}"
          echo "cpu_model=$(sysctl -n machdep.cpu.brand_string)"
          swift --version 2>&1 | sed -n '1p' || true
          xcodebuild -version
          uname -a

          git fetch --no-tags --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"

          work_root="${RUNNER_TEMP}/realistic-relative"
          rm -rf "${work_root}"
          mkdir -p "${work_root}"
          git worktree add --detach "${work_root}/base" "${BASE_SHA}"
          git worktree add --detach "${work_root}/head" "${HEAD_SHA}"

          ./.github/scripts/realistic-relative-observation.sh \
            --base-dir "${work_root}/base" \
            --head-dir "${work_root}/head" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --threshold "${REALISTIC_RELATIVE_OBSERVATION_THRESHOLD}"

          echo "observation_finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  cross-target-compile:
    name: Cross-target compile
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          echo "developer_dir=${DEVELOPER_DIR:-unset}"
          xcode-select -p
          ls -d /Applications/Xcode*.app || true
          swift --version
          xcodebuild -version
          uname -a

      - name: Compile TextEngineCore for non-host targets
        run: ./.github/scripts/cross-target-compile.sh
