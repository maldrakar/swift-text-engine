name: Swift CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: swift-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests-and-benchmark-gate:
    name: Host tests and benchmark gate
    runs-on: ubuntu-latest
    container: swift:6.2.1-bookworm
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PR change scope
        id: change-scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "docs_only_pr=false" >> "$GITHUB_OUTPUT"
            echo "mode=docs_only_pr event=$EVENT_NAME result=not_pull_request docs_only_pr=false"
            exit 0
          fi

          fail_scope() {
            echo "mode=docs_only_pr result=infrastructure_failure reason=$1 docs_only_pr=false"
            exit 2
          }

          [[ -n "${BASE_SHA}" ]] || fail_scope "missing_base_sha"
          [[ -n "${HEAD_SHA}" ]] || fail_scope "missing_head_sha"
          [[ -n "${RUNNER_TEMP:-}" ]] || fail_scope "missing_runner_temp"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git cat-file -e "${BASE_SHA}^{commit}" || fail_scope "base_commit_unavailable"
          git cat-file -e "${HEAD_SHA}^{commit}" || fail_scope "head_commit_unavailable"

          trusted_ci_dir="${RUNNER_TEMP}/trusted-ci"
          case "${trusted_ci_dir}/" in
            "${GITHUB_WORKSPACE}/"*) fail_scope "trusted_worktree_inside_workspace" ;;
          esac

          git worktree remove --force "$trusted_ci_dir" 2>/dev/null || rm -rf "$trusted_ci_dir"
          git worktree add --detach "$trusted_ci_dir" "$BASE_SHA"

          trusted_detector="${trusted_ci_dir}/.github/scripts/detect-docs-only-pr.sh"
          [[ -f "$trusted_detector" ]] || fail_scope "trusted_detector_unavailable"

          bash "$trusted_detector" --base "$BASE_SHA" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT"

      - name: Complete docs-only PR
        if: steps.change-scope.outputs.docs_only_pr == 'true'
        run: echo "mode=docs_only_pr job=host-tests-and-benchmark-gate result=success"

      - name: Show toolchain
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: |
          swift --version
          git --version
          uname -a
          cat /etc/os-release
          lscpu || true

      - name: Run host tests
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift test --scratch-path /tmp/text-engine-host-build

      - name: Run synthetic benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --gate

      - name: Run variable-height benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --variable-height --gate

      - name: Run variable-height mutation benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --variable-height-mutation --gate

      - name: Run structural mutation benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --structural-mutation --gate

      - name: Run bulk structural mutation benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --bulk-structural-mutation --gate

      - name: Run line query benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --line-query --gate

      - name: Run line geometry query benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --line-geometry-query --gate

      - name: Run column query benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --column-query --gate

      - name: Run column geometry query benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --column-geometry-query --gate

      - name: Run point query benchmark gate
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --point-query --gate

      - name: Observe point-geometry query benchmark latency
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --point-geometry-query

      - name: Run memory shape diagnostic
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --memory-shape

      - name: Run RSS memory observation diagnostic
        if: steps.change-scope.outputs.docs_only_pr != 'true'
        run: swift run -c release --scratch-path /tmp/text-engine-host-build ViewportBenchmarks -- --memory-observation

      - name: Observe realistic provider relative performance
        if: github.event_name == 'pull_request' && steps.change-scope.outputs.docs_only_pr != 'true'
        continue-on-error: true
        # The host job runs in a container, where GitHub executes `run` steps
        # under `sh`. This step uses `set -o pipefail`, a bashism, so it must
        # request bash explicitly or it fails at line 1 (silently, since the
        # step is continue-on-error).
        shell: bash
        env:
          REALISTIC_RELATIVE_OBSERVATION_THRESHOLD: "1.221556"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "observation_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "runner_image=${ImageOS:-unknown}"
          swift --version 2>&1 | sed -n '1p' || true
          git --version
          uname -a
          cat /etc/os-release || true
          lscpu || true

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --no-tags --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"

          work_root="${RUNNER_TEMP}/realistic-relative"
          rm -rf "${work_root}"
          mkdir -p "${work_root}"
          git worktree add --detach "${work_root}/base" "${BASE_SHA}"
          git worktree add --detach "${work_root}/head" "${HEAD_SHA}"

          ./.github/scripts/realistic-relative-observation.sh \
            --base-dir "${work_root}/base" \
            --head-dir "${work_root}/head" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --threshold "${REALISTIC_RELATIVE_OBSERVATION_THRESHOLD}"

          echo "observation_finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  ios-cross-target-compile:
    name: iOS cross-target compile
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PR change scope
        id: change-scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
